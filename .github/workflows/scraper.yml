name: Weekly Proposal Scraper

on:
  schedule:
    - cron: '0 8 * * 1' # every Monday at 08:00 UTC
  workflow_dispatch: {}

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Restore scraper state cache
        uses: actions/cache@v4
        with:
          path: data/seen_links.json
          key: proposal-scraper-state-${{ github.run_id }}
          restore-keys: |
            proposal-scraper-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run proposal scraper
        env:
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python -m scraper.run

      - name: Save scraper state cache
        uses: actions/cache@v4
        with:
          path: data/seen_links.json
          key: proposal-scraper-state-${{ github.run_id }}
